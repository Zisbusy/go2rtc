name: Build and Export Docker Tar Files

# 触发工作流的事件：
# 1. 手动触发 (workflow_dispatch)
# 2. 推送到 master 分支
# 3. 推送带有 v* 前缀的标签 (如 v1.0.0)
on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'

jobs:
  # Job 1: 编译各种操作系统的二进制文件
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    env: { CGO_ENABLED: 0 } # 禁用 CGO 以确保静态编译
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      # --- Linux 平台构建 ---
      - name: Build go2rtc_linux_amd64
        env: { GOOS: linux, GOARCH: amd64 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_amd64
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_amd64, path: go2rtc }

      - name: Build go2rtc_linux_arm64
        env: { GOOS: linux, GOARCH: arm64 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_arm64
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_arm64, path: go2rtc }

      # ARM v7 (32位)
      - name: Build go2rtc_linux_arm
        env: { GOOS: linux, GOARCH: arm, GOARM: 7 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_arm
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_arm, path: go2rtc }

      # ARM v6 (32位，常用于树莓派1/Zero)
      - name: Build go2rtc_linux_armv6
        env: { GOOS: linux, GOARCH: arm, GOARM: 6 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_armv6
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_armv6, path: go2rtc }
        
  # Job 2: 为每个平台构建 Docker 镜像并导出为 tar 文件
  build-docker-tar:
    name: Build Docker tar for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/386
          - linux/arm/v6
          - linux/arm/v7
          - linux/arm64/v8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 动态获取版本号
      - name: Get version
        id: get_version
        run: |
          # 如果是 tag 触发 (如 v1.0.0)，使用 tag 名称
          # 如果是分支触发 (如 master)，使用分支名称
          # 如果是手动触发，默认为 dev
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [[ $GITHUB_REF == refs/heads/* ]]; then
            VERSION=${GITHUB_REF#refs/heads/}
          else
            VERSION="dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # 设置平台相关的变量
      - name: Set platform variables
        id: platform_vars
        run: |
          case "${{ matrix.platform }}" in
            "linux/amd64") echo "platform_tag=amd64" >> $GITHUB_OUTPUT ;;
            "linux/386") echo "platform_tag=386" >> $GITHUB_OUTPUT ;;
            "linux/arm/v6") echo "platform_tag=armv6" >> $GITHUB_OUTPUT ;;
            "linux/arm/v7") echo "platform_tag=armv7" >> $GITHUB_OUTPUT ;;
            "linux/arm64/v8") echo "platform_tag=arm64" >> $GITHUB_OUTPUT ;;
          esac

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. 构建并加载到 Docker 守护进程
      # 注意：这里必须包含 -t 参数来指定镜像名和版本
      - name: Build Docker image
        run: |
          IMAGE_NAME="go2rtc"
          IMAGE_TAG="${{ steps.get_version.outputs.VERSION }}-${{ steps.platform_vars.outputs.platform_tag }}"
          FULL_TAG="${IMAGE_NAME}:${IMAGE_TAG}"
          
          echo "Building image: $FULL_TAG for platform ${{ matrix.platform }}"
          
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --load \
            -t $FULL_TAG \
            -f docker/Dockerfile .

      # 3. 使用 docker save 导出为 tar
      # 这样导出的 tar 包导入后会自动带有名字和版本
      - name: Export Docker image to tar
        run: |
          IMAGE_NAME="go2rtc"
          IMAGE_TAG="${{ steps.get_version.outputs.VERSION }}-${{ steps.platform_vars.outputs.platform_tag }}"
          FILE_NAME="go2rtc_${{ steps.get_version.outputs.VERSION }}_${{ steps.platform_vars.outputs.platform_tag }}.tar"
          
          # 导出指定标签的镜像
          docker save -o $FILE_NAME ${IMAGE_NAME}:${IMAGE_TAG}

      # 上传 tar 文件作为 artifact
      - name: Upload Docker tar file
        uses: actions/upload-artifact@v4
        with:
          name: go2rtc_docker_${{ steps.platform_vars.outputs.platform_tag }}
          path: go2rtc_${{ steps.get_version.outputs.VERSION }}_${{ steps.platform_vars.outputs.platform_tag }}.tar
