      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: go2rtc-docker-hardware
          path: go2rtc_hardware_*.tar.gz

  # Job 3: Rockchip 版 Docker 打包 (替代原 docker-rockchip)
  docker-rockchip:
    name: Package docker rockchip
    runs-on: ubuntu-latest
