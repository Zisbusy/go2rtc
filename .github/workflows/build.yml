name: Build and Push

# 触发工作流的事件：
# 1. 手动触发 (workflow_dispatch)
# 2. 推送到 master 分支
# 3. 推送带有 v* 前缀的标签 (如 v1.0.0)
on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'

jobs:
  # Job 1: 编译各种操作系统的二进制文件
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    env: { CGO_ENABLED: 0 } # 禁用 CGO 以确保静态编译
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      # --- Linux 平台构建 ---
      - name: Build go2rtc_linux_amd64
        env: { GOOS: linux, GOARCH: amd64 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_amd64
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_amd64, path: go2rtc }

      - name: Build go2rtc_linux_arm64
        env: { GOOS: linux, GOARCH: arm64 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_arm64
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_arm64, path: go2rtc }

      # ARM v7 (32位)
      - name: Build go2rtc_linux_arm
        env: { GOOS: linux, GOARCH: arm, GOARM: 7 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_arm
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_arm, path: go2rtc }

      # ARM v6 (32位，常用于树莓派1/Zero)
      - name: Build go2rtc_linux_armv6
        env: { GOOS: linux, GOARCH: arm, GOARM: 6 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_armv6
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_armv6, path: go2rtc }

  # Job 2: 构建标准 Docker 镜像 (多架构)
  docker-master:
    name: Build docker master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 自动推断镜像标签和元数据
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            # 如果不是 Fork 的仓库，则推送到 DockerHub
            name=${{ github.repository }},enable=${{ github.event.repository.fork == false }}
            # 始终推送到 GitHub Container Registry (GHCR)
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},enable=false
            type=match,pattern=v(.*),group=1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建并推送
      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          # 支持多种架构
          platforms: |
            linux/amd64
            linux/386
            linux/arm/v6
            linux/arm/v7
            linux/arm64/v8
          outputs: type=docker,dest=/tmp/go2rtc-image.tar
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 导出Docker镜像为tar文件并作为artifact上传
      - name: Export Docker image as tar
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/docker-images
          docker image ls --format "{{.Repository}}:{{.Tag}}" | grep -E "${{ github.repository }}|ghcr.io/${{ github.repository }}" | while read image; do
            filename=$(echo "$image" | sed 's/[\/:]/_/g').tar
            docker save -o "/tmp/docker-images/$filename" "$image"
            echo "Exported $image to $filename"
          done

      - name: Upload Docker image as artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-tar
          path: /tmp/docker-images/
