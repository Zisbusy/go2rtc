  # Job 1: 标准版 Docker 打包 (替代原 docker-master)
  docker-master:
    name: Package docker master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=match,pattern=v(.*),group=1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export
        # 构建镜像并导出为 tar 文件
        run: |
          IMAGE_NAME="go2rtc-master"
          TAGS="${{ steps.meta.outputs.tags }}"
          # 取第一个 tag 作为文件名后缀，防止文件名过长
          FILE_SUFFIX=$(echo $TAGS | cut -d',' -f1 | tr '/' '-')
          
          docker buildx build \
            --platform linux/amd64,linux/386,linux/arm/v6,linux/arm/v7,linux/arm64/v8 \
            -f docker/Dockerfile \
            -t $IMAGE_NAME:$FILE_SUFFIX \
            --load .
            
          docker save $IMAGE_NAME:$FILE_SUFFIX -o go2rtc_master_$FILE_SUFFIX.tar

      - name: Compress Artifact
        # 压缩文件以节省空间和上传时间
        run: gzip go2rtc_master_*.tar

      - name: Upload Artifact
        # 上传打包好的文件
        uses: actions/upload-artifact@v4
        with:
          name: go2rtc-docker-master
          path: go2rtc_master_*.tar.gz

  # Job 2: 硬件加速版 Docker 打包 (替代原 docker-hardware)
  docker-hardware:
    name: Package docker hardware
    runs-on: ubuntu-latest
    steps:
