name: Build and Export Docker Images (for Testing)

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'

jobs:

  docker-master:
    name: Build and export docker master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},enable=false
            type=match,pattern=v(.*),group=1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建镜像，但不推送
      - name: Build image (no push)
        id: build_image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: |
            linux/amd64
            linux/386
            linux/arm/v6
            linux/arm/v7
            linux/arm64/v8
          push: false
          # 输出到本地docker daemon，以便后续save
          load: true 
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 获取构建的镜像ID，用于docker save
      - name: Get Image ID
        id: get_image_id
        run: |
          # 假设镜像标签是唯一的，或者我们只关心一个tag
          IMAGE_ID=$(docker images --format "{{.ID}}" ${{ fromJSON(steps.meta.outputs.json).tags[0] }})
          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "Found image ID: $IMAGE_ID"

      # 导出镜像为tar文件
      - name: Save image to tar
        run: |
          # 使用获取到的镜像ID进行导出，避免tag冲突
          docker save -o go2rtc_docker_master_image.tar ${{ steps.get_image_id.outputs.image_id }}
      
      # 上传tar文件作为artifact
      - name: Upload Docker Image Tar
        uses: actions/upload-artifact@v4
        with:
          name: go2rtc-docker-master-image-tar
          path: go2rtc_docker_master_image.tar

  docker-hardware:
    name: Build and export docker hardware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta-hw
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-hardware,onlatest=true
            latest=auto
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},enable=false
            type=match,pattern=v(.*),group=1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建镜像，但不推送
      - name: Build image (no push)
        id: build_image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/hardware.Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta-hw.outputs.tags }}
          labels: ${{ steps.meta-hw.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 获取构建的镜像ID
      - name: Get Image ID
        id: get_image_id
        run: |
          IMAGE_ID=$(docker images --format "{{.ID}}" ${{ fromJSON(steps.meta-hw.outputs.json).tags[0] }})
          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "Found image ID: $IMAGE_ID"

      # 导出镜像为tar文件
      - name: Save image to tar
        run: |
          docker save -o go2rtc_docker_hardware_image.tar ${{ steps.get_image_id.outputs.image_id }}
      
      # 上传tar文件作为artifact
      - name: Upload Docker Image Tar
        uses: actions/upload-artifact@v4
        with:
          name: go2rtc-docker-hardware-image-tar
          path: go2rtc_docker_hardware_image.tar

  docker-rockchip:
    name: Build and export docker rockchip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta-rk
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-rockchip,onlatest=true
            latest=auto
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},enable=false
            type=match,pattern=v(.*),group=1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建镜像，但不推送
      - name: Build image (no push)
        id: build_image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/rockchip.Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: ${{ steps.meta-rk.outputs.tags }}
          labels: ${{ steps.meta-rk.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 获取构建的镜像ID
      - name: Get Image ID
        id: get_image_id
        run: |
          IMAGE_ID=$(docker images --format "{{.ID}}" ${{ fromJSON(steps.meta-rk.outputs.json).tags[0] }})
          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "Found image ID: $IMAGE_ID"

      # 导出镜像为tar文件
      - name: Save image to tar
        run: |
          docker save -o go2rtc_docker_rockchip_image.tar ${{ steps.get_image_id.outputs.image_id }}
      
      # 上传tar文件作为artifact
      - name: Upload Docker Image Tar
        uses: actions/upload-artifact@v4
        with:
          name: go2rtc-docker-rockchip-image-tar
          path: go2rtc_docker_rockchip_image.tar
