name: Build and Export Docker Tar Files

# 触发工作流的事件：
# 1. 手动触发 (workflow_dispatch)
# 2. 推送到 master 分支
# 3. 推送带有 v* 前缀的标签 (如 v1.0.0)
on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'

jobs:
  # Job 1: 编译各种操作系统的二进制文件
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    env: { CGO_ENABLED: 0 } # 禁用 CGO 以确保静态编译
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      # --- Linux 平台构建 ---
      - name: Build go2rtc_linux_amd64
        env: { GOOS: linux, GOARCH: amd64 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_amd64
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_amd64, path: go2rtc }

      - name: Build go2rtc_linux_arm64
        env: { GOOS: linux, GOARCH: arm64 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_arm64
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_arm64, path: go2rtc }

      # ARM v7 (32位)
      - name: Build go2rtc_linux_arm
        env: { GOOS: linux, GOARCH: arm, GOARM: 7 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_arm
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_arm, path: go2rtc }

      # ARM v6 (32位，常用于树莓派1/Zero)
      - name: Build go2rtc_linux_armv6
        env: { GOOS: linux, GOARCH: arm, GOARM: 6 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_armv6
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_armv6, path: go2rtc }

  # Job 2: 为每个平台构建 Docker 镜像并导出为 tar 文件
  build-docker-tar:
    name: Build Docker tar for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: build-binaries
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/386
          - linux/arm/v6
          - linux/arm/v7
          - linux/arm64/v8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 设置平台相关的变量
      - name: Set platform variables
        id: platform_vars
        run: |
          case "${{ matrix.platform }}" in
            "linux/amd64") 
              echo "platform_tag=amd64" >> $GITHUB_OUTPUT
              echo "platform_dir=linux/amd64" >> $GITHUB_OUTPUT
              ;;
            "linux/386") 
              echo "platform_tag=386" >> $GITHUB_OUTPUT
              echo "platform_dir=linux/386" >> $GITHUB_OUTPUT
              ;;
            "linux/arm/v6") 
              echo "platform_tag=armv6" >> $GITHUB_OUTPUT
              echo "platform_dir=linux/arm/v6" >> $GITHUB_OUTPUT
              ;;
            "linux/arm/v7") 
              echo "platform_tag=armv7" >> $GITHUB_OUTPUT
              echo "platform_dir=linux/arm/v7" >> $GITHUB_OUTPUT
              ;;
            "linux/arm64/v8") 
              echo "platform_tag=arm64" >> $GITHUB_OUTPUT
              echo "platform_dir=linux/arm64/v8" >> $GITHUB_OUTPUT
              ;;
          esac

      # 根据推送类型确定标签
      - name: Determine image tag
        id: tag
        run: |
          if [[ $GITHUB_REF_TYPE == "tag" ]]; then
            TAG_NAME=$(echo ${GITHUB_REF} | sed 's/refs\/tags\///')
            if [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
              VERSION=${TAG_NAME#v}
              echo "image_tag=${VERSION}" >> $GITHUB_OUTPUT
            else
              echo "image_tag=latest" >> $GITHUB_OUTPUT
            fi
          else
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          fi

      # 下载对应的二进制文件
      - name: Download binary for ${{ matrix.platform }}
        uses: actions/download-artifact@v4
        with:
          name: go2rtc_linux_${{ steps.platform_vars.outputs.platform_tag }}
          path: ./binary

      # 确保二进制文件可执行
      - name: Make binary executable
        run: chmod +x ./binary/go2rtc

      # 设置 QEMU 模拟器（对于非 amd64 架构）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: matrix.platform != 'linux/amd64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建 Docker 镜像并标记
      - name: Build Docker image
        run: |
          # 如果 docker 目录不存在，创建一个临时的 Dockerfile
          if [ ! -d "docker" ]; then
            mkdir -p docker
            cat > docker/Dockerfile << EOF
FROM alpine:latest
RUN apk add --no-cache ca-certificates
COPY binary/go2rtc /go2rtc
RUN chmod +x /go2rtc
EXPOSE 1984
CMD ["/go2rtc"]
EOF
          fi
          
          # 构建镜像并标记
          IMAGE_NAME="go2rtc:${{ steps.tag.outputs.image_tag }}-${{ steps.platform_vars.outputs.platform_tag }}"
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --tag $IMAGE_NAME \
            -f docker/Dockerfile .
          
          # 验证镜像已构建
          docker images $IMAGE_NAME

      # 保存带标签的镜像为 tar 文件
      - name: Save Docker image as tar
        run: |
          IMAGE_NAME="go2rtc:${{ steps.tag.outputs.image_tag }}-${{ steps.platform_vars.outputs.platform_tag }}"
          OUTPUT_FILE="go2rtc_${{ steps.tag.outputs.image_tag }}-${{ steps.platform_vars.outputs.platform_tag }}.tar"
          
          # 保存镜像为 tar 文件
          docker save $IMAGE_NAME -o $OUTPUT_FILE
          
          # 检查生成的 tar 文件
          ls -la $OUTPUT_FILE
          echo "File size: $(du -h $OUTPUT_FILE)"

      # 上传 tar 文件作为 artifact
      - name: Upload Docker tar file
        uses: actions/upload-artifact@v4
        with:
          name: go2rtc_docker_${{ steps.tag.outputs.image_tag }}-${{ steps.platform_vars.outputs.platform_tag }}
          path: go2rtc_*.tar
